<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>minfern todos &mdash; a type-checked SPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #1e1e2e;
    --panel: #282a36;
    --panel-2: #313244;
    --text: #cdd6f4;
    --muted: #9399b2;
    --accent: #89b4fa;
    --accent-2: #94e2d5;
    --danger: #f38ba8;
    --done: #585b70;
    --border: #45475a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  main {
    max-width: 560px;
    margin: 48px auto;
    padding: 0 20px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 24px;
  }
  .subtitle code {
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }

  button {
    background: var(--accent);
    color: #11111b;
    border: 0;
    border-radius: 8px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.1s;
  }
  button:hover { filter: brightness(1.08); }
  button:active { filter: brightness(0.95); }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .filters button {
    background: var(--panel-2);
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .filters button.active {
    background: var(--accent);
    color: #11111b;
  }

  ul.todos {
    list-style: none;
    padding: 0;
    margin: 0;
    border-top: 1px solid var(--border);
  }

  ul.todos li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
  }
  ul.todos li.done .text {
    color: var(--done);
    text-decoration: line-through;
  }

  .toggle {
    width: 22px;
    height: 22px;
    flex: 0 0 auto;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    background: transparent;
    color: transparent;
    padding: 0;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
  }
  .toggle.on {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #11111b;
  }

  .text {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
  }

  .delete {
    background: transparent;
    color: var(--muted);
    font-size: 18px;
    padding: 4px 8px;
  }
  .delete:hover { color: var(--danger); }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
    padding-top: 12px;
  }
  .footer button {
    background: transparent;
    color: var(--muted);
    font-weight: 500;
    padding: 4px 8px;
  }
  .footer button:hover { color: var(--danger); }

  .empty {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 24px 0;
  }

  .save-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .save-row button {
    background: var(--panel-2);
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .save-row button:hover { background: var(--accent); color: #11111b; }
  .save-status {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
<main>
  <h1>minfern todos</h1>
  <p class="subtitle">
    A classic React-style SPA written in plain JavaScript and type-checked with
    <code>minfern</code>. No framework, no build step, no runtime cost.
  </p>

  <div class="card">
    <div class="input-row">
      <input id="new-input" type="text" placeholder="What needs to be done?" autofocus>
      <button id="add-btn">Add</button>
    </div>

    <div class="filters">
      <button id="filter-all" class="active">All</button>
      <button id="filter-active">Active</button>
      <button id="filter-done">Done</button>
    </div>

    <ul id="todo-list" class="todos"></ul>

    <div id="footer" class="footer"></div>

    <div class="save-row">
      <button id="save-btn">Save</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
